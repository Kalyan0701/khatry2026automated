# =============================================================================
# Phase 2: Optimized ViT
# =============================================================================
# AdamW with CosineAnnealingLR scheduler.
# Result: 94.64% test accuracy
# =============================================================================

data:
  positive_dir: "Datasets/Positive"
  negative_dir: "Datasets/Negative"
  test_size: 0.20
  val_fraction: 0.176
  random_state: 42
  image_size: 224
  batch_size: 16
  num_workers: 2

model:
  num_classes: 2
  pretrained: true

training:
  optimizer: "adamw"
  lr: 1.0e-4
  weight_decay: 5.0e-5
  scheduler: "cosine_annealing"
  epochs: 100
  patience: 7
